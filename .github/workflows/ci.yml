name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  main-pr-gate:
    name: Require PR for main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Verify main update came from a merged PR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          subject="$(git show -s --format=%s "$SHA")"
          if [ "$ACTOR" = "github-actions[bot]" ] && [ "$subject" = "ci: revert direct push to main" ]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
            echo "Allowing CI-generated rollback commit."
            exit 0
          fi

          pr_count="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/commits/$SHA/pulls" \
              --jq '[.[] | select(.state == "closed" and .merged_at != null and .base.ref == "main")] | length'
          )"

          if [ "$pr_count" -gt 0 ]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
            echo "main was updated by a merged PR."
            exit 0
          fi

          echo "authorized=false" >> "$GITHUB_OUTPUT"
          echo "::error::Direct pushes to main are not allowed. Open a PR and merge it instead."
          exit 1

  revert-direct-main-push:
    name: Revert direct main push
    runs-on: ubuntu-latest
    needs: main-pr-gate
    if: always() && needs.main-pr-gate.outputs.authorized == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Revert unauthorized main update
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "::error::Cannot safely auto-revert the first commit on main."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          if ! git merge-base --is-ancestor "$AFTER" HEAD; then
            echo "main has moved past $AFTER; skip automatic rollback."
            exit 0
          fi

          commits="$(git rev-list "$BEFORE..$AFTER")"
          if [ -z "$commits" ]; then
            echo "No commits to revert."
            exit 0
          fi

          for commit in $commits; do
            parent_count="$(git show -s --format=%P "$commit" | wc -w | tr -d ' ')"
            if [ "$parent_count" -gt 1 ]; then
              git revert --no-commit --mainline 1 "$commit"
            else
              git revert --no-commit "$commit"
            fi
          done

          if git diff --cached --quiet && git diff --quiet; then
            echo "Rollback produced no changes."
            exit 0
          fi

          git commit -m "ci: revert direct push to main" \
            -m "Direct pushes to main are not allowed. Use a pull request." \
            -m "Reverted push ending at $AFTER."
          git push origin HEAD:main

  go-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lab
          POSTGRES_PASSWORD: lab
          POSTGRES_DB: lab_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test and vet Go backend
        run: |
          if [ ! -f go-server/go.mod ]; then
            echo "go-server/go.mod not found; Go backend not implemented yet, skipping."
            exit 0
          fi
          cd go-server
          go test ./...
          go vet ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test and build frontend
        run: |
          if [ ! -f web-ui/package.json ]; then
            echo "web-ui/package.json not found; frontend not implemented yet, skipping."
            exit 0
          fi
          cd web-ui
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json missing; commit the lockfile for reproducible CI."
            exit 1
          fi
          npm ci
          npm test --if-present
          npm run build --if-present

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python agent
        run: |
          if ! find py-agent -type f -name '*.py' | grep -q .; then
            echo "No Python agent files found; agent not implemented yet, skipping."
            exit 0
          fi
          if [ -f py-agent/requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r py-agent/requirements.txt
          fi
          python -m compileall -q py-agent
